  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Simulator</title>
</head>
<body>

    <div>
       <form>
         <input id="input" placeholder="Enter Array Size">
         <button onclick="Submit()" type="button">Submit</button>
       </form>
    </div>

    <div id="EleInput"></div>
    
    <button onclick="BuildArray()" type="button">Create Array</button>
    
    <br><br>

    <h3>Current Array: <span id="arrayDisplay"></span></h3>
    
    <hr>

    <div id="event">
       <button onclick="Push()">Push</button>
       <button onclick="Shift()">Shift</button>
       <button onclick="Pop()">Pop</button>
       <button onclick="Unshift()">UnShift</button>
       <button onclick="Splice()">Splice</button>
       <button onclick="Slice()">Slice</button>
       <button onclick="Map()">Map</button>
       <button onclick="Reduce()">Reduce</button>
       <button onclick="Filter()">Filter</button>
       <button onclick="Reverse()">Reverse</button>
       <button onclick="Ascending()">Sort (A to Z)</button>
       <button onclick="Descending()">Sort (Z to A)</button>
        <button onclick="ShowLength()">Show Length</button>
    </div>

</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
